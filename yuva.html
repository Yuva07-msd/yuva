<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Happy Birthday Berlyn</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --gold: #C9A84C;
    --gold-light: #F0D080;
    --rose: #E8A0B4;
    --deep: #1A0A2E;
    --purple: #6A2080;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    touch-action: none;
  }

  body {
    min-height: 100vh;
    min-height: -webkit-fill-available;
    background: var(--deep);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    position: relative;
  }

  /* ── STARFIELD ── */
  .stars-layer {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 0;
  }
  .star {
    position: absolute; border-radius: 50%; background: white;
    animation: twinkle var(--dur) ease-in-out infinite alternate;
    opacity: 0;
  }
  @keyframes twinkle {
    0%   { opacity: 0; transform: scale(0.5); }
    100% { opacity: var(--max-op); transform: scale(1.2); }
  }

  /* ── PETALS ── */
  .particle-layer { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
  .petal {
    position: absolute; border-radius: 50% 0;
    animation: fall var(--fall-dur) linear infinite;
    top: -40px;
  }
  @keyframes fall {
    0%   { transform: translateY(-40px) translateX(0) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.8; }
    90%  { opacity: 0.5; }
    100% { transform: translateY(110vh) translateX(var(--drift)) rotate(720deg); opacity: 0; }
  }

  /* ── BALLOONS ── */
  .balloons { position: fixed; inset: 0; pointer-events: none; z-index: 2; }
  .balloon {
    position: absolute; bottom: -60px;
    animation: floatUp var(--b-dur) ease-in var(--b-delay) infinite;
  }
  @keyframes floatUp {
    0%   { transform: translateY(0) translateX(0); opacity: 0; }
    5%   { opacity: 1; }
    50%  { transform: translateY(-55vh) translateX(var(--b-sway)); opacity: 0.9; }
    95%  { opacity: 0.1; }
    100% { transform: translateY(-110vh) translateX(var(--b-sway2)); opacity: 0; }
  }

  /* ── CARD WRAP ── */
  .card-wrap {
    position: relative; z-index: 10;
    width: 100%; max-width: 420px;
    padding: 16px;
    display: flex; align-items: center; justify-content: center;
  }

  .card {
    width: 100%;
    background: linear-gradient(160deg, #2D0A4E 0%, #1A0A2E 45%, #0D1B3E 100%);
    border-radius: 28px;
    border: 1px solid rgba(201,168,76,0.3);
    box-shadow:
      0 0 40px rgba(201,168,76,0.12),
      0 0 80px rgba(106,32,128,0.18),
      inset 0 0 60px rgba(201,168,76,0.04);
    padding: 36px 28px 32px;
    text-align: center;
    animation: cardReveal 1.2s cubic-bezier(0.22,1,0.36,1) both;
    position: relative;
    overflow: hidden;
  }
  @keyframes cardReveal {
    from { opacity: 0; transform: translateY(50px) scale(0.92); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* spinning gold border */
  .card::before {
    content: '';
    position: absolute; inset: 0; border-radius: 28px;
    background: conic-gradient(
      from var(--angle),
      transparent 0deg, rgba(201,168,76,0.55) 60deg,
      transparent 120deg, rgba(232,160,180,0.4) 180deg,
      transparent 240deg, rgba(201,168,76,0.55) 300deg,
      transparent 360deg
    );
    animation: spin 6s linear infinite;
    padding: 1.5px;
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
  }
  @property --angle { syntax: '<angle>'; initial-value: 0deg; inherits: false; }
  @keyframes spin { to { --angle: 360deg; } }

  .card::after {
    content: ''; position: absolute; inset: -1px; border-radius: 28px;
    background:
      radial-gradient(ellipse 70% 40% at 50% 0%, rgba(201,168,76,0.13) 0%, transparent 70%),
      radial-gradient(ellipse 60% 35% at 50% 100%, rgba(106,32,128,0.22) 0%, transparent 70%);
    pointer-events: none;
  }

  /* ── CORNERS ── */
  .corner { position: absolute; width: 38px; height: 38px; opacity: 0.38; }
  .corner svg { width: 100%; height: 100%; }
  .corner-tl { top: 12px; left: 12px; }
  .corner-tr { top: 12px; right: 12px; transform: scaleX(-1); }
  .corner-bl { bottom: 12px; left: 12px; transform: scaleY(-1); }
  .corner-br { bottom: 12px; right: 12px; transform: scale(-1,-1); }

  /* ── CAKE ── */
  .cake-zone {
    margin-bottom: 20px; height: 100px;
    display: flex; align-items: center; justify-content: center;
  }
  .cake-svg {
    filter: drop-shadow(0 0 12px rgba(201,168,76,0.5));
    animation: cakeBob 3s ease-in-out infinite;
  }
  @keyframes cakeBob {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-7px); }
  }
  .flame {
    animation: flicker 0.18s ease-in-out infinite alternate;
    transform-origin: center bottom;
  }
  @keyframes flicker {
    0%   { transform: scaleX(1) scaleY(1) rotate(-2deg); opacity: 1; }
    100% { transform: scaleX(1.1) scaleY(0.95) rotate(2deg); opacity: 0.9; }
  }

  /* ── TYPOGRAPHY ── */
  .label-top {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300; font-size: 11px;
    letter-spacing: 5px; text-transform: uppercase;
    color: var(--gold-light); opacity: 0.8;
    margin-bottom: 8px;
    animation: fadeUp 0.8s 0.4s both;
  }
  .title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(40px, 12vw, 56px);
    font-weight: 700; line-height: 1.0;
    background: linear-gradient(135deg, #F0D080 0%, #C9A84C 30%, #F5E8A0 55%, #C9A84C 80%, #F0D080 100%);
    background-size: 200% 200%;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: fadeUp 0.9s 0.5s both, shimmerText 4s 1.5s linear infinite;
    margin-bottom: 4px;
  }
  @keyframes shimmerText { 0%{background-position:0% 50%} 100%{background-position:200% 50%} }

  .name-tag {
    font-family: 'Playfair Display', serif;
    font-size: clamp(34px, 10vw, 50px);
    font-style: italic; font-weight: 400;
    background: linear-gradient(135deg, #F5E8A0 0%, #E8A0B4 45%, #C9A84C 100%);
    background-size: 200% 200%;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: fadeUp 0.9s 0.6s both, shimmerText 4s 1.8s linear infinite;
    margin-bottom: 4px; letter-spacing: 3px;
    filter: drop-shadow(0 0 10px rgba(232,160,180,0.35));
  }

  .subtitle {
    font-family: 'Playfair Display', serif;
    font-size: clamp(16px, 5vw, 22px);
    font-style: italic; color: var(--rose);
    animation: fadeUp 0.9s 0.65s both;
    margin-bottom: 22px;
  }

  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 0 auto 20px; width: 85%;
    animation: fadeUp 0.8s 0.75s both;
  }
  .divider-line {
    flex: 1; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(201,168,76,0.5), transparent);
  }
  .divider-diamond {
    width: 6px; height: 6px;
    background: var(--gold); transform: rotate(45deg); flex-shrink: 0;
    box-shadow: 0 0 8px rgba(201,168,76,0.8);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100%{ box-shadow:0 0 8px rgba(201,168,76,0.8); }
    50%    { box-shadow:0 0 18px rgba(201,168,76,1); }
  }

  .message {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(15px, 4vw, 17px);
    font-weight: 300; color: rgba(253,246,236,0.82);
    line-height: 1.9;
    animation: fadeUp 0.9s 0.85s both;
    margin-bottom: 22px;
  }
  .message em { font-style: italic; color: var(--gold-light); font-weight: 400; }

  .sig-zone {
    animation: fadeUp 0.9s 1s both;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  .sig-line {
    width: 100px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(201,168,76,0.6), transparent);
  }
  .sig-text {
    font-family: 'Playfair Display', serif; font-style: italic;
    font-size: 13px; color: rgba(201,168,76,0.7); letter-spacing: 1px;
  }

  /* ── BUTTON ── */
  .btn-zone { margin-top: 24px; animation: fadeUp 0.9s 1.1s both; }
  .btn {
    display: inline-block;
    padding: 14px 40px;
    border: 1px solid rgba(201,168,76,0.5);
    border-radius: 50px;
    color: var(--gold-light);
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px; letter-spacing: 3px; text-transform: uppercase;
    cursor: pointer; background: rgba(201,168,76,0.07);
    transition: all 0.3s ease;
    -webkit-appearance: none; appearance: none;
    position: relative; overflow: hidden;
    /* bigger touch target */
    min-height: 52px;
  }
  .btn:active {
    transform: scale(0.96);
    background: rgba(201,168,76,0.18);
    box-shadow: 0 0 28px rgba(201,168,76,0.4);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── BURST ── */
  .burst { position: fixed; pointer-events: none; z-index: 20; }
  .burst-dot { position: absolute; border-radius: 50%; transform-origin: 0 0; }

  /* ── TAP RIPPLE on card ── */
  .ripple {
    position: absolute; border-radius: 50%;
    background: rgba(201,168,76,0.25);
    animation: rippleOut 0.6s ease-out forwards;
    pointer-events: none;
    transform: scale(0);
  }
  @keyframes rippleOut {
    to { transform: scale(4); opacity: 0; }
  }
</style>
</head>
<body>

<div class="stars-layer" id="stars"></div>
<div class="particle-layer" id="petals"></div>
<div class="balloons" id="balloons"></div>

<div class="card-wrap">
  <div class="card" id="card">

    <!-- Corner ornaments -->
    <div class="corner corner-tl">
      <svg viewBox="0 0 44 44" fill="none">
        <path d="M2 42 L2 8 Q2 2 8 2 L42 2" stroke="#C9A84C" stroke-width="1" fill="none"/>
        <circle cx="2" cy="2" r="2" fill="#C9A84C"/>
        <path d="M8 2 L8 16 M2 8 L16 8" stroke="#C9A84C" stroke-width="0.5" opacity="0.5"/>
      </svg>
    </div>
    <div class="corner corner-tr">
      <svg viewBox="0 0 44 44" fill="none"><path d="M2 42 L2 8 Q2 2 8 2 L42 2" stroke="#C9A84C" stroke-width="1" fill="none"/><circle cx="2" cy="2" r="2" fill="#C9A84C"/></svg>
    </div>
    <div class="corner corner-bl">
      <svg viewBox="0 0 44 44" fill="none"><path d="M2 42 L2 8 Q2 2 8 2 L42 2" stroke="#C9A84C" stroke-width="1" fill="none"/><circle cx="2" cy="2" r="2" fill="#C9A84C"/></svg>
    </div>
    <div class="corner corner-br">
      <svg viewBox="0 0 44 44" fill="none"><path d="M2 42 L2 8 Q2 2 8 2 L42 2" stroke="#C9A84C" stroke-width="1" fill="none"/><circle cx="2" cy="2" r="2" fill="#C9A84C"/></svg>
    </div>

    <!-- Cake -->
    <div class="cake-zone">
      <svg class="cake-svg" width="96" height="106" viewBox="0 0 110 120" fill="none">
        <rect x="49" y="14" width="12" height="28" rx="3" fill="#E8A0B4"/>
        <ellipse class="flame" cx="55" cy="10" rx="6" ry="9" fill="#FFC94A"/>
        <ellipse class="flame" cx="55" cy="11" rx="3.5" ry="6" fill="#FFF5C0" style="animation-delay:0.07s"/>
        <rect x="20" y="42" width="70" height="26" rx="6" fill="#C9A84C"/>
        <rect x="20" y="42" width="70" height="10" rx="6" fill="#F0D080"/>
        <path d="M28 52 Q32 62 36 52 Q40 62 44 52 Q48 62 52 52 Q56 62 60 52 Q64 62 68 52 Q72 62 76 52 Q80 62 84 52" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
        <rect x="14" y="68" width="82" height="36" rx="8" fill="#6A2080"/>
        <rect x="14" y="68" width="82" height="12" rx="8" fill="#9040B0"/>
        <path d="M22 80 Q26 92 30 80 Q34 92 38 80 Q42 92 46 80 Q50 92 54 80 Q58 92 62 80 Q66 92 70 80 Q74 92 78 80 Q82 92 86 80" stroke="rgba(240,208,128,0.6)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <ellipse cx="55" cy="105" rx="46" ry="6" fill="rgba(201,168,76,0.3)"/>
        <circle cx="30" cy="78" r="2" fill="#F0D080" opacity="0.8"/>
        <circle cx="55" cy="74" r="2" fill="#F0D080" opacity="0.8"/>
        <circle cx="80" cy="78" r="2" fill="#F0D080" opacity="0.8"/>
        <path d="M38 20 L39 16 L40 20 L44 21 L40 22 L39 26 L38 22 L34 21 Z" fill="#FFC94A" opacity="0.7"/>
        <path d="M66 18 L67 15 L68 18 L71 19 L68 20 L67 23 L66 20 L63 19 Z" fill="#FFC94A" opacity="0.5"/>
      </svg>
    </div>

    <p class="label-top">A Special Wish For You</p>
    <h1 class="title">Happy<br>Birthday!</h1>
    <p class="name-tag">Berlyn</p>
    <p class="subtitle">May your day shine bright</p>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-diamond"></div>
      <div class="divider-line"></div>
      <div class="divider-diamond"></div>
      <div class="divider-line"></div>
    </div>

    <p class="message">
      On this special day, may every moment<br>
      be filled with <em>joy, laughter,</em><br>
      <em>and golden memories.</em><br>
      You deserve all the happiness<br>
      the universe can offer —<br>
      <em>today, tomorrow, and always.</em>
    </p>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-diamond"></div>
      <div class="divider-line"></div>
    </div>

    <div class="sig-zone">
      <div class="sig-line"></div>
      <p class="sig-text">With love &amp; warmest wishes ✦</p>
    </div>

    <div class="btn-zone">
      <button class="btn" id="celebrateBtn">✦ Celebrate ✦</button>
    </div>

  </div>
</div>

<script>
/* ── STARS ── */
(function(){
  const layer = document.getElementById('stars');
  for(let i=0;i<100;i++){
    const s=document.createElement('div'); s.className='star';
    const size=Math.random()*2.5+0.5;
    s.style.cssText=`width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--dur:${(Math.random()*3+1.5).toFixed(2)}s;--max-op:${(Math.random()*0.7+0.2).toFixed(2)};animation-delay:${(Math.random()*4).toFixed(2)}s;`;
    layer.appendChild(s);
  }
})();

/* ── PETALS ── */
(function(){
  const layer=document.getElementById('petals');
  const colors=['#E8A0B4','#C9A84C','#9040B0','#F0D080','#C06080'];
  for(let i=0;i<18;i++){
    const p=document.createElement('div'); p.className='petal';
    const c=colors[Math.floor(Math.random()*colors.length)];
    const size=Math.random()*10+5;
    const drift=(Math.random()-0.5)*180;
    p.style.cssText=`width:${size}px;height:${size*0.7}px;background:${c};opacity:${Math.random()*0.5+0.3};left:${Math.random()*100}%;--fall-dur:${(Math.random()*8+6).toFixed(1)}s;--drift:${drift.toFixed(0)}px;animation-delay:${(Math.random()*10).toFixed(1)}s;transform:rotate(${Math.random()*360}deg);`;
    layer.appendChild(p);
  }
})();

/* ── BALLOONS ── */
(function(){
  const layer=document.getElementById('balloons');
  const emojis=['🎈','🎈','🎉','🎊','🎈','✨','🎈'];
  for(let i=0;i<7;i++){
    const b=document.createElement('div'); b.className='balloon';
    const sway=(Math.random()-0.5)*100;
    b.style.cssText=`left:${Math.random()*90+5}%;--b-dur:${(Math.random()*5+7).toFixed(1)}s;--b-delay:${(Math.random()*8).toFixed(1)}s;--b-sway:${sway.toFixed(0)}px;--b-sway2:${(sway*1.3).toFixed(0)}px;font-size:${Math.random()*14+20}px;`;
    b.textContent=emojis[i%emojis.length];
    layer.appendChild(b);
  }
})();

/* ── CELEBRATE (tap) ── */
function celebrate(tx, ty) {
  const colors=['#F0D080','#E8A0B4','#C9A84C','#9040B0','#FFC94A','#60D0FF','#FF6080'];
  for(let b=0;b<5;b++){
    const bx=tx+(Math.random()-0.5)*160;
    const by=ty+(Math.random()-0.5)*200;
    createBurst(bx,by,colors);
  }
}

function createBurst(cx,cy,colors){
  const container=document.createElement('div');
  container.className='burst';
  container.style.cssText=`left:${cx}px;top:${cy}px;`;
  for(let i=0;i<20;i++){
    const dot=document.createElement('div'); dot.className='burst-dot';
    const angle=(i/20)*360;
    const dist=Math.random()*80+40;
    const size=Math.random()*7+4;
    dot.style.cssText=`width:${size}px;height:${size}px;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:${Math.random()>0.5?'50%':'3px'};animation:burst-out 0.9s cubic-bezier(0,0.7,0.3,1) forwards;--bx:${Math.cos(angle*Math.PI/180)*dist}px;--by:${Math.sin(angle*Math.PI/180)*dist}px;`;
    container.appendChild(dot);
  }
  if(!document.getElementById('burst-kf')){
    const st=document.createElement('style'); st.id='burst-kf';
    st.textContent=`@keyframes burst-out{0%{opacity:1;transform:translate(0,0) scale(1)}70%{opacity:0.9;transform:translate(var(--bx),var(--by)) scale(1.1)}100%{opacity:0;transform:translate(calc(var(--bx)*1.3),calc(var(--by)*1.3)) scale(0.2)}}`;
    document.head.appendChild(st);
  }
  document.body.appendChild(container);
  setTimeout(()=>container.remove(),1000);
}

/* button — tap to celebrate */
document.getElementById('celebrateBtn').addEventListener('touchstart', function(e){
  e.preventDefault();
  const touch=e.touches[0];
  celebrate(touch.clientX, touch.clientY);
}, {passive:false});
document.getElementById('celebrateBtn').addEventListener('click', function(e){
  const rect=this.getBoundingClientRect();
  celebrate(rect.left+rect.width/2, rect.top+rect.height/2);
});

/* tap anywhere on card for ripple + mini burst */
document.getElementById('card').addEventListener('touchstart', function(e){
  const touch=e.touches[0];
  /* ripple */
  const ripple=document.createElement('div'); ripple.className='ripple';
  const r=this.getBoundingClientRect();
  const size=80;
  ripple.style.cssText=`width:${size}px;height:${size}px;left:${touch.clientX-r.left-size/2}px;top:${touch.clientY-r.top-size/2}px;`;
  this.appendChild(ripple);
  setTimeout(()=>ripple.remove(),700);
  /* mini burst */
  createBurst(touch.clientX, touch.clientY, ['#F0D080','#E8A0B4','#C9A84C','#FFC94A']);
},{passive:true});
</script>
</body>
</html>
